name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  go-security:
    name: Go Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '~1.25'
          check-latest: true

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Go security scanner (gosec)
        uses: securego/gosec@master
        with:
          # G101: false positive on SA token path constant
          # G104: intentional error ignoring on best-effort parsing (Sscanf, json.Unmarshal)
          # G114: http.ListenAndServe timeout — handled by K8s liveness probes
          # G304: VERSION file path is a hardcoded constant, not user input
          # G402: InsecureSkipVerify intentional for in-cluster ArgoCD
          # G706: log injection — structured logging with slog, values are not user-controlled
          args: -exclude=G101,G104,G114,G304,G402,G706 -exclude-generated ./...

  frontend-security:
    name: Frontend Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high || true

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  # Image scanning happens in the release workflow (after the real image is built)
  # No need to build the full Docker image just to scan it during PR checks

  helm-scan:
    name: Helm Chart Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Helm chart scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: charts/argocd-addons-platform
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0
          format: table
