name: Security Scan

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 6am UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  go-security:
    name: Go Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '~1.25'
          check-latest: true

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Go security scanner (gosec)
        uses: securego/gosec@master
        with:
          args: -exclude-generated ./...

  frontend-security:
    name: Frontend Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high || true

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: [go-security, frontend-security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: aap-server:scan
          platforms: linux/amd64

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aap-server:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  helm-scan:
    name: Helm Chart Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Helm chart scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: charts/argocd-addons-platform
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0
          format: table
