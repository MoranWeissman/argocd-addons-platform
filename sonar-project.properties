sonar.projectKey=argocd-addons-platform
sonar.projectName=ArgoCD Addons Platform
sonar.projectVersion=1.0.0

# Go backend
sonar.sources=cmd,internal
sonar.tests=internal
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage.out

# TypeScript frontend
sonar.typescript.lcov.reportPaths=ui/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/dist/**,**/vendor/**
