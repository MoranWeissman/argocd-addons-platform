repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.6
    hooks:
      - id: golangci-lint
        args: [--fix]

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd ui && npx eslint --fix .'
        language: system
        files: '\.(ts|tsx)$'
        pass_filenames: false

      - id: go-test
        name: go tests
        entry: go test ./internal/...
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: ui-typecheck
        name: typescript check
        entry: bash -c 'cd ui && npx tsc -b --noEmit'
        language: system
        pass_filenames: false
        stages: [pre-push]
