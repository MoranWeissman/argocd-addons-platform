# Production values.
# Secrets are passed via --set from .env.secrets — never in this file.

replicaCount: 1

image:
  repository: ghcr.io/moranweissman/argocd-addons-platform
  tag: "1.13.2"
  pullPolicy: Always

config:
  connections:
    - name: merck-ahtl/argocd-cluster-addons
      default: true
      git:
        provider: github
        owner: merck-ahtl
        repo: argocd-cluster-addons
        token: ${GITHUB_TOKEN}
      argocd:
        # In-cluster: use HTTP (port 80) via k8s service DNS + ArgoCD API token
        server_url: "http://argocd-devops-argocd-addons-dev-eks-server.argocd.svc.cluster.local"
        token: ${ARGOCD_TOKEN}
        namespace: argocd
        insecure: true

rbac:
  create: true
  argocdNamespace: argocd

auth: {}
  # username and password passed via --set from .env.secrets

ai:
  enabled: true
  provider: gemini
  cloudModel: gemini-2.5-flash

datadog:
  enabled: true
  site: datadoghq.com

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  hosts:
    - host: argocd-addons-platform.mahi-techlabs.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
