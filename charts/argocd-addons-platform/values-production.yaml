# Production values for merck-ahtl deployment.
# Secrets are passed via --set from .env.secrets — never in this file.

replicaCount: 1

image:
  repository: aap-server
  tag: "1.0.0"
  pullPolicy: IfNotPresent

config:
  connections:
    - name: dev
      default: true
      git:
        provider: github
        owner: merck-ahtl
        repo: argocd-cluster-addons
        token: ${GITHUB_TOKEN}
      argocd:
        server_url: ${ARGOCD_NONPROD_SERVER_URL}
        token: ${ARGOCD_TOKEN}
        namespace: argocd
        insecure: true

rbac:
  create: true
  argocdNamespace: argocd

ai:
  enabled: true
  provider: gemini
  cloudModel: gemini-2.5-flash

datadog:
  enabled: true
  site: datadoghq.com

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: aap.argocd-addons.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
