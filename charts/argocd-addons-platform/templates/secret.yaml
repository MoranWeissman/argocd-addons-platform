{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aap.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aap.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets }}
  {{- if $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.ai.enabled .Values.ai.apiKey }}
  AI_API_KEY: {{ .Values.ai.apiKey | quote }}
  {{- end }}
  {{- if and .Values.datadog.enabled .Values.datadog.apiKey }}
  DATADOG_API_KEY: {{ .Values.datadog.apiKey | quote }}
  {{- end }}
  {{- if and .Values.datadog.enabled .Values.datadog.appKey }}
  DATADOG_APP_KEY: {{ .Values.datadog.appKey | quote }}
  {{- end }}
  {{- if .Values.auth.username }}
  AAP_AUTH_USER: {{ .Values.auth.username | quote }}
  {{- end }}
  {{- if .Values.auth.password }}
  AAP_AUTH_PASSWORD: {{ .Values.auth.password | quote }}
  {{- end }}
{{- end }}
