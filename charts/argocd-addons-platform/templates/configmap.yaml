apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aap.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aap.labels" . | nindent 4 }}
data:
  config.yaml: |
    connections:
    {{- range .Values.config.connections }}
      - name: {{ .name }}
        {{- if .default }}
        default: true
        {{- end }}
        {{- with .git }}
        git:
          provider: {{ .provider | default "github" }}
          {{- if eq (.provider | default "github") "github" }}
          owner: {{ .owner | default "" | quote }}
          repo: {{ .repo | default "" | quote }}
          token: {{ .token | default "" | quote }}
          {{- else if eq .provider "azuredevops" }}
          organization: {{ .organization | default "" | quote }}
          project: {{ .project | default "" | quote }}
          repository: {{ .repository | default "" | quote }}
          pat: {{ .pat | default "" | quote }}
          {{- end }}
        {{- end }}
        argocd:
        {{- with .argocd }}
          {{- if .server_url }}
          server_url: {{ .server_url | quote }}
          {{- end }}
          {{- if .token }}
          token: {{ .token | quote }}
          {{- end }}
          namespace: {{ .namespace | default "argocd" | quote }}
          {{- if .insecure }}
          insecure: true
          {{- end }}
        {{- else }}
          namespace: "argocd"
          insecure: true
        {{- end }}
    {{- end }}
